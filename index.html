<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7fb" />
    <meta name="description" content="PDF 报告下载" />
    <title>PDF报告下载</title>
    <style>
      :root {
        --ink: #19233a;
        --muted: #6b7487;
        --line: #dfe5f0;
        --paper: #ffffff;
        --ground: #f5f7fb;
        --blue: #2c61ca;
        --blue-dark: #1c4fae;
      }

      * { box-sizing: border-box; }

      html, body { min-height: 100%; }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--ground);
        font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
        -webkit-font-smoothing: antialiased;
      }

      .page {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .topbar {
        height: 72px;
        padding: 0 max(24px, env(safe-area-inset-right)) 0 max(24px, env(safe-area-inset-left));
        display: grid;
        grid-template-columns: 44px 1fr 44px;
        align-items: center;
        background: rgba(255, 255, 255, 0.82);
        border-bottom: 1px solid rgba(35, 59, 102, 0.06);
        backdrop-filter: blur(16px);
      }

      .back {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 0;
        padding: 0;
        color: var(--ink);
        background: transparent;
        font: 38px/1 Georgia, serif;
        transform: translateY(-2px);
        cursor: pointer;
      }

      .back:focus-visible, .menu:focus-visible, .download:focus-visible {
        outline: 3px solid rgba(44, 97, 202, 0.25);
        outline-offset: 3px;
      }

      .heading { text-align: center; }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .domain {
        margin: 3px 0 0;
        color: #81899a;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        font-size: 13px;
        line-height: 1;
      }

      .menu {
        justify-self: end;
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: var(--ink);
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 72px;
      }

      .report-card {
        width: min(100%, 560px);
        position: relative;
        padding: 40px 36px 34px;
        background: var(--paper);
        border: 1px solid rgba(29, 55, 101, 0.04);
        border-radius: 10px;
        box-shadow: 0 18px 45px rgba(42, 62, 99, 0.08);
        animation: rise 520ms cubic-bezier(.2, .8, .2, 1) both;
      }

      .report-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 36px;
        right: 36px;
        height: 3px;
        background: var(--blue);
      }

      .download {
        min-height: 66px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 2px solid var(--blue);
        border-radius: 8px;
        color: var(--blue);
        background: transparent;
        text-decoration: none;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: 23px;
        font-weight: 500;
        letter-spacing: 0;
        transition: background-color 180ms ease, color 180ms ease, transform 180ms ease;
      }

      .download:hover { background: var(--blue); color: #fff; }
      .download:active { transform: scale(0.985); }

      .download-mark {
        width: 17px;
        height: 19px;
        position: relative;
        display: inline-block;
        border-bottom: 2px solid currentColor;
      }

      .download-mark::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 0;
        height: 12px;
        border-left: 2px solid currentColor;
      }

      .download-mark::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 7px;
        width: 6px;
        height: 6px;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .divider { height: 1px; margin: 28px 0 22px; background: var(--line); }

      .notice {
        margin: 0;
        color: var(--muted);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        line-height: 1.9;
      }

      .notice strong { color: #4d596e; font-weight: 600; }

      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 460px) {
        .topbar { height: 66px; }
        main { align-items: flex-end; padding: 24px 16px max(34px, env(safe-area-inset-bottom)); }
        .report-card { padding: 32px 24px 28px; }
        .report-card::before { left: 24px; right: 24px; }
        .download { min-height: 61px; font-size: 20px; }
        .notice { font-size: 15px; line-height: 1.85; }
      }

      @media (prefers-reduced-motion: reduce) { .report-card { animation: none; } }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <button class="back" type="button" aria-label="返回" onclick="history.length > 1 ? history.back() : location.assign('/')">&#215;</button>
        <div class="heading">
          <h1>PDF报告下载</h1>
          <p class="domain" id="domain">文件下载中心</p>
        </div>
        <button class="menu" type="button" aria-label="更多选项" onclick="navigator.share ? navigator.share({ title: document.title, url: location.href }) : navigator.clipboard?.writeText(location.href)">&#183;&#183;&#183;</button>
      </header>

      <main>
        <section class="report-card" aria-label="PDF 报告下载">
          <a class="download" href="assets/AJDA226W00931.pdf" download="AJDA226W00931.pdf">
            <span>点击下载PDF报告书</span><span class="download-mark" aria-hidden="true"></span>
          </a>
          <div class="divider" aria-hidden="true"></div>
          <p class="notice"><strong>声明：</strong>部分手机默认浏览器可能无法完整显示电子印章。建议使用支持 PDF 阅读的浏览器打开或下载后查看。电子版与纸质版报告的骑缝章位置可能不同，不影响文件内容的完整性。</p>
        </section>
      </main>
    </div>
    <script>
      const domain = document.getElementById('domain');
      domain.textContent = window.location.host || '文件下载中心';
    </script>
  </body>
</html>
